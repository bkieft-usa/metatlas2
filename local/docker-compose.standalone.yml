services:
  jupyterlab:
    image: ghcr.io/bkieft-usa/metatlas2:${METATLAS2_IMAGE_TAG:-latest}
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "/app/.venv/bin/python -m ipykernel install
      --name metatlas2-standalone
      --display-name 'Metatlas2 (standalone)'
      --sys-prefix
      &&
      /app/.venv/bin/jupyter lab
      --ip=0.0.0.0
      --port=8889
      --no-browser
      --allow-root
      --IdentityProvider.token=''
      --ServerApp.password=''
      --ServerApp.default_url='/lab/tree/local_workflow.ipynb'
      --ServerApp.root_dir=/data"
    ports:
      - "127.0.0.1:${STANDALONE_PORT:-8889}:8889"
      - "127.0.0.1:8050-8069:8050-8069"
    volumes:
      - ${REPO_DIR}:/repo:ro
      - ${STANDALONE_DIR}:/data
      - ${JUPYTER_CONFIG_TMPDIR}:/tmp/jupyter_config
    environment:
      METATLAS_DATA_DIR: /data
      METATLAS2_STANDALONE: "true"
      JUPYTERHUB_SERVICE_PREFIX: "/"
      USER: standalone
      PYTHONPATH: "/repo:/app"
      # Force Jupyter to use a clean config with no overrides
      JUPYTER_CONFIG_DIR: /tmp/jupyter_config
      JUPYTER_CONFIG_PATH: /tmp/jupyter_config
    network_mode: ${NETWORK_MODE:-bridge}
    restart: "no"